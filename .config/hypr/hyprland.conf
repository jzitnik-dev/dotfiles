env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GRIMBLAST_EDITOR,swappy -f

source=~/.config/hypr/device_specific.conf

windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$


# █▀▀ ▀▄▀ █▀▀ █▀▀
# ██▄ █░█ ██▄ █▄▄
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = wlsunset -S 8:00 -s 20:00 -t 5000
exec-once = swaybg -m fill -i "$(\ls ~/wallpapers/* | shuf -n1)"
exec-once = waybar
exec-once = wl-paste --type text --watch cliphist store
exec-once = hypridle
exec-once = swaync
exec-once = swayosd-server

# █ █▄░█ █▀█ █░█ ▀█▀
# █ █░▀█ █▀▀ █▄█ ░█░
input {
  kb_layout = cz,us
  kb_variant = ,
  follow_mouse = 1
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  numlock_by_default = true
  kb_options = caps:swapescape,grp:win_space_toggle

  touchpad {
    natural_scroll = true
    # disable_while_typing = false
  }
}

# █▀▀ █▀▀ █▄░█ █▀▀ █▀█ ▄▀█ █░░
# █▄█ ██▄ █░▀█ ██▄ █▀▄ █▀█ █▄▄
general {
  gaps_in=5
  gaps_out=5
  border_size=0
  layout = dwindle
}

# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  enable_swallow = true
  swallow_regex = ^(alacritty)$
  background_color = 000000
  middle_click_paste = false
  vfr = true
}

# █▀▄ █▀▀ █▀▀ █▀█ █▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▄▀ ██▄ █▄▄ █▄█ █▀▄ █▀█ ░█░ █ █▄█ █░▀█

decoration {
  # █▀█ █▀█ █░█ █▄░█ █▀▄   █▀▀ █▀█ █▀█ █▄░█ █▀▀ █▀█
  # █▀▄ █▄█ █▄█ █░▀█ █▄▀   █▄▄ █▄█ █▀▄ █░▀█ ██▄ █▀▄
  rounding = 8
  #multisample_edges = true

  # █▀█ █▀█ ▄▀█ █▀▀ █ ▀█▀ █▄█
  # █▄█ █▀▀ █▀█ █▄▄ █ ░█░ ░█░
  active_opacity = 1.0
  inactive_opacity = 1.0

  # █▄▄ █░░ █░█ █▀█
  # █▄█ █▄▄ █▄█ █▀▄
  blur {
    enabled = true
    size = 3
    passes = 3
    new_optimizations = true
    ignore_opacity = true
  }


  # █▀ █░█ ▄▀█ █▀▄ █▀█ █░█░█
  # ▄█ █▀█ █▀█ █▄▀ █▄█ ▀▄▀▄▀
  shadow {
    enabled = true
    ignore_window = true
    offset = 2 2
    range = 4
    render_power = 2
    color = 0x66000000
  }
}

# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
animations {
  enabled = true
  # █▄▄ █▀▀ ▀█ █ █▀▀ █▀█   █▀▀ █░█ █▀█ █░█ █▀▀
  # █▄█ ██▄ █▄ █ ██▄ █▀▄   █▄▄ █▄█ █▀▄ ▀▄▀ ██▄
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1

  animation = windows, 1, 5, overshot, slide
  animation = windowsOut, 1, 4, smoothOut, slide
  animation = windowsMove, 1, 4, default
  animation = border, 1, 10, default
  animation = fade, 1, 10, smoothIn
  animation = fadeDim, 1, 10, smoothIn
  animation = workspaces, 1, 4, default

}

gesture = 3, horizontal, workspace

# Window jobs
gesture = 2, pinch, mod: SUPER, fullscreen
gesture = 3, pinch, mod: SUPER, float
gesture = 4, down, close
# Resizing and moving window
gesture = 4, horizontal, mod: SUPER SHIFT, resize
gesture = 4, vertical, mod: SUPER SHIFT, resize
gesture = 4, horizontal, mod: SUPER, move
gesture = 4, vertical, mod: SUPER, move


# █░░ ▄▀█ █▄█ █▀█ █░█ ▀█▀ █▀
# █▄▄ █▀█ ░█░ █▄█ █▄█ ░█░ ▄█

dwindle {
  pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # you probably want this
}

# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀█ █░█ █░░ █▀▀ █▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █▀▄ █▄█ █▄▄ ██▄ ▄█
windowrule = match:title file_progress, float on
windowrule = match:title confirm, float on
windowrule = match:title dialog, float on
windowrule = match:title download, float on
windowrule = match:title notification, float on
windowrule = match:title error, float on
windowrule = match:title splash, float on
windowrule = match:title confirmreset, float on
windowrule = match:title Open File, float on
windowrule = match:title branchdialog, float on
windowrule = match:title Lxappearance, float on
windowrule = match:title Rofi, float on
windowrule = match:title Rofi, animation none
windowrule = match:title viewnior, float on
windowrule = match:title feh, float on
windowrule = match:title pavucontrol-qt, float on
windowrule = match:title pavucontrol, float on
windowrule = match:title file-roller, float on
windowrule = match:title wlogout, fullscreen on
windowrule = match:title wlogout, float on
windowrule = match:title wlogout, fullscreen on
windowrule = match:title mpv, idle_inhibit focus
windowrule = match:title firefox, idle_inhibit fullscreen
windowrule = match:title ^(Media viewer)$, float on
windowrule = match:title ^(Volume Control)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Volume Control)$, size 800 600
windowrule = match:title ^(Volume Control)$, move 75 44%
windowrule = match:title ^(Alacritty)$, fullscreen on

bind=SUPER, F2, exec, swaybg -m fill -i "$(\ls ~/wallpapers/* | shuf -n1)"

# █▀▄▀█ █░█ █░░ ▀█▀ █ █▀▄▀█ █▀▀ █▀▄ █ ▄▀█
# █░▀░█ █▄█ █▄▄ ░█░ █ █░▀░█ ██▄ █▄▀ █ █▀█
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, swayosd-client --playerctl play-pause
bind = , XF86AudioPause, exec, swayosd-client --playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , CAPS_LOCK, exec, sleep 0.1 && swayosd-client --caps-lock # Idk with the sleep it works, without it always says on, don't question it pls

# █▀ █▀▀ █▀█ █▀▀ █▀▀ █▄░█ █▀ █░█ █▀█ ▀█▀
# ▄█ █▄▄ █▀▄ ██▄ ██▄ █░▀█ ▄█ █▀█ █▄█ ░█░
$screenshotarea = \
    hyprctl keyword animation "fadeOut,1,0.1,ease"; \
    grimblast --notify edit area; \
    hyprctl keyword animation "fadeOut,1,1,ease"
    
bind = SUPER, Q, exec, $screenshotarea
bind = , Print, exec, $screenshotarea

# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄
bind = SUPER, F1, exec, hyprlock
bind = SUPER SHIFT, Return, exec, alacritty
bind = SUPER SHIFT, F, exec, thunar
bind = SUPER, F, exec, alacritty --command lf
bind = SUPER SHIFT, O, exec, obsidian
bind = SUPER, B, exec, firefox
bind = SUPER, O, exec, bash ~/.config/rofi/launchers/misc/launcher.sh
bind = SUPER CONTROL, O, exec, bash ~/.config/rofi/launchers/launcher.sh
bind = SUPER SHIFT, S, exec, bash ~/.config/rofi/ssh/ssh.sh
bind = SUPER, period, exec, rofimoji --action print --selector rofi --selector-args "-theme ~/.config/rofi/style-1.rasi" | tr -d '\n' | wl-copy
bind = SUPER SHIFT, Q, exec, wlogout --protocol layer-shell -b 5 -T 400 -B 400
bind = SUPER, S, exec, bash ~/.config/rofi/outputchooser/outputchooser.sh
bind = SUPER SHIFT, A, exec, bash ~/.config/rofi/greenclip/greenclip.sh
bind = SUPER SHIFT, I, exec, bash ~/.config/rofi/wifi/wifi.sh
bind = SUPER, comma, exec, wl-color-picker
bind = SUPER, p, exec, rmtpfs
bind = SUPER SHIFT, B, exec, bash ~/.config/rofi/bluetooth/blt-connect.sh
bind = SUPER CONTROL, M, exec, mounter
bind = SUPER CONTROL, A, exec, mounter --all
bind = SUPER, N, exec, swaync-client -t -sw

# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀▄▀█ ▄▀█ █▄░█ ▄▀█ █▀▀ █▀▄▀█ █▀▀ █▄░█ ▀█▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █░▀░█ █▀█ █░▀█ █▀█ █▄█ █░▀░█ ██▄ █░▀█ ░█░
bind = SUPER SHIFT, C, killactive,
bind = SUPER, V, fullscreen,
bind = SUPER, T, togglefloating,
bind = SUPER CONTROL, space, togglesplit,

# █▀▀ █▀█ █▀▀ █░█ █▀
# █▀░ █▄█ █▄▄ █▄█ ▄█
bind = SUPER, j, movefocus, l
bind = SUPER, k, movefocus, r
bind = SUPER, u, movefocus, u
bind = SUPER, m, movefocus, d

# █▀▄▀█ █▀█ █░█ █▀▀
# █░▀░█ █▄█ ▀▄▀ ██▄
bind = SUPER SHIFT, j, movewindow, l
bind = SUPER SHIFT, k, movewindow, r
bind = SUPER SHIFT, u, movewindow, u
bind = SUPER SHIFT, m, movewindow, d

# █▀█ █▀▀ █▀ █ ▀█ █▀▀
# █▀▄ ██▄ ▄█ █ █▄ ██▄
bind = SUPER CTRL, left, resizeactive, -20 0
bind = SUPER CTRL, right, resizeactive, 20 0
bind = SUPER CTRL, up, resizeactive, 0 -20
bind = SUPER CTRL, down, resizeactive, 0 20

# ▀█▀ ▄▀█ █▄▄ █▄▄ █▀▀ █▀▄
# ░█░ █▀█ █▄█ █▄█ ██▄ █▄▀
bind= SUPER, g, togglegroup,
bind= SUPER, tab, changegroupactive,

# █▀ █▀█ █▀▀ █▀▀ █ ▄▀█ █░░
# ▄█ █▀▀ ██▄ █▄▄ █ █▀█ █▄▄
bind = SUPER, grave, togglespecialworkspace,
bind = SUPER SHIFT, grave, movetoworkspace, special

# █▀ █░█░█ █ ▀█▀ █▀▀ █░█
# ▄█ ▀▄▀▄▀ █ ░█░ █▄▄ █▀█
bind = SUPER, plus, workspace, 1
bind = SUPER, ecaron, workspace, 2
bind = SUPER, scaron, workspace, 3
bind = SUPER, ccaron, workspace, 4
bind = SUPER, rcaron, workspace, 5
bind = SUPER, zcaron, workspace, 6
bind = SUPER, yacute, workspace, 7
bind = SUPER, aacute, workspace, 8
bind = SUPER, iacute, workspace, 9
bind = SUPER, eacute, workspace, 10
bind = SUPER, right, workspace, r+1
bind = SUPER, left, workspace, r-1

# █▀▄▀█ █▀█ █░█ █▀▀
# █░▀░█ █▄█ ▀▄▀ ██▄
bind = SUPER SHIFT, plus, movetoworkspacesilent, 1
bind = SUPER SHIFT, ecaron, movetoworkspacesilent, 2
bind = SUPER SHIFT, scaron, movetoworkspacesilent, 3
bind = SUPER SHIFT, ccaron, movetoworkspacesilent, 4
bind = SUPER SHIFT, rcaron, movetoworkspacesilent, 5
bind = SUPER SHIFT, zcaron, movetoworkspacesilent, 6
bind = SUPER SHIFT, yacute, movetoworkspacesilent, 7
bind = SUPER SHIFT, aacute, movetoworkspacesilent, 8
bind = SUPER SHIFT, iacute, movetoworkspacesilent, 9
bind = SUPER SHIFT, eacute, movetoworkspacesilent, 10
bind = SUPER SHIFT, right, movetoworkspacesilent, r+1
bind = SUPER SHIFT, left, movetoworkspacesilent, r-1
bind = SUPER SHIFT, e, movetoworkspacesilent, r+1
bind = SUPER SHIFT, w, movetoworkspacesilent, r-1


# █▀▄▀█ █▀█ █░█ █▀ █▀▀   █▄▄ █ █▄░█ █▀▄ █ █▄░█ █▀▀
# █░▀░█ █▄█ █▄█ ▄█ ██▄   █▄█ █ █░▀█ █▄▀ █ █░▀█ █▄█
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
